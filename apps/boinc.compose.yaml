services:
  boinc-client:
    image: boinc/client:arm64v8@sha256:2031746369792456c0cb03809a4f10d019c516504e23b1ccb649ba518261e0b4
    environment:
      - BOINC_CMD_LINE_OPTIONS=--allow_remote_gui_rpc
      - BOINC_GUI_RPC_PASSWORD=$BOINC_GUI_RPC_PASSWORD
    volumes:
      - boinc-client-data:/var/lib/boinc
    restart: unless-stopped

  boinc-manager:
    build:
      context: boinc
      dockerfile: manager.Containerfile
    volumes:
      - boinc-manager-data:/config
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.boinc-manager.entrypoints=websecure
      - traefik.http.routers.boinc-manager.rule=Host(`boinc.$DOMAIN`)
      - traefik.http.routers.boinc-manager.middlewares=authelia@docker
      - traefik.http.services.boinc-manager-docker.loadbalancer.server.port=5800

volumes:
  boinc-client-data:
  boinc-manager-data:
