include:
  - owntracks.compose.yaml

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.10.2
    environment:
      - WEBHOOK_URL=https://n8n.$DOMAIN
      - EXTERNAL_HOOK_FILES=/home/node/.n8n/hooks.js
      - N8N_FORWARD_AUTH_HEADER=Remote-Email
    volumes:
      - ./.volumes/n8n:/home/node/.n8n
      - ./n8n/hooks.js:/home/node/.n8n/hooks.js:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.middlewares=authelia@docker
      - traefik.http.services.n8n-docker.loadbalancer.server.port=5678

  kara:
    image: svenstaro/miniserve:0.33.0-alpine
    command: /html
    volumes:
      - ./.volumes/kara:/html:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kara.entrypoints=websecure
      - traefik.http.services.kara-docker.loadbalancer.server.port=8080
